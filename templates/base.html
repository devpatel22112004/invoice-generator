<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Invoice Generator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="container">
            <h1 class="brand">📄 Invoice Generator</h1>
            <p class="tagline">GST-compliant invoices with CGST / SGST / IGST — instant PDF download</p>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <small>Open-source invoice generator · MIT License</small>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
